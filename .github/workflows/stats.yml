name: Generate GitHub Stats

on:
  schedule:
    - cron: "0 0 * * *" # Roj raat ko 12 baje update hoga
  workflow_dispatch:

jobs:
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v3

      - name: Generate GitHub Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.GITHUB_TOKEN }} # Built-in token
          user: Vibhanshusoni
          template: classic
          base: header, community, repositories, metadata
          filename: github-metrics.svg
          config_timezone: Asia/Kolkata

      - name: Commit and Push
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add github-metrics.svg
          git commit -m "Auto-update GitHub stats" || echo "No changes to commit"
          git push
